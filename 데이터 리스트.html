<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터리스트</title>
</head>
<body>
    <h3>제목은 생략가능</h3>
<form>
  가고 샢은 나라:
  <input type="text" list="countries"><br>
<datalist id="countries">
    <option value="가나"></option>
    <option value="나이지라아"></option>
    <option value="도미니카공화국"></option>
</datalist>
보고 싶은 관광지:
<input type="text" list="where"><br>
<datalist id="where">
    <option value="밀림"></option>
    <option value="탄광"></option>
    <option value="시장"></option>
</datalist>
</form>
</body>
</html>
